name: Deploy to Development

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Copy build to project directory
        run: |
          rm -rf /www/wwwroot/sim-managed-api/*
          cp -r . /www/wwwroot/sim-managed-api/

      - name: Restart PM2
        run: |
          cd /www/wwwroot/sim-managed-api
          pm2 restart sim-managed-api || pm2 start dist/main.js --name sim-managed-api