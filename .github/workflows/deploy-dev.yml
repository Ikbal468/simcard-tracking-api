name: Deploy to aaPanel Dev Server

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Replace dist in aaPanel directory
        run: |
          rm -rf /www/wwwroot/sim-managed-api/dist
          cp -r dist /www/wwwroot/sim-managed-api/

      - name: Reload PM2
        run: |
          pm2 reload sim-managed-api
          pm2 save
