name: Deploy to Development

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to project directory
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            ./ /www/wwwroot/sim-managed-api/

      - name: Install production dependencies
        run: |
          cd /www/wwwroot/sim-managed-api
          npm install --production

      - name: Restart PM2
        run: |
          cd /www/wwwroot/sim-managed-api
          pm2 restart sim-managed-api || pm2 start dist/main.js --name sim-managed-api